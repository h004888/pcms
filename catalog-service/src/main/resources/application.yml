spring:
  application:
    name: catalog-service
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB
  config:
    import: "optional:configserver:http://localhost:8888"
  profiles:
    active: default
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

pcms:
  catalog:
    image-upload-dir: uploads/medicines
