server:
  port: 8080

app:
  jwt:
    secret: "pcms-jwt-secret-key-must-be-at-least-32-bytes-long-for-hs256-signing-2026"

spring:
  application:
    name: api-gateway
  main:
    allow-bean-definition-overriding: true
  config:
    import: "optional:configserver:http://localhost:8888"
  profiles:
    active: default
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration
      - org.springframework.boot.data.jpa.autoconfigure.DataJpaRepositoriesAutoConfiguration
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force-response: true
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      server:
        webmvc:
          routes:
            # Auth & User (UC01, UC02) + Dashboard + Audit Logs
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**,/api/v1/dashboard/**,/api/v1/audit-logs/**
              filters:
                - StripPrefix=2
            # Branch (UC03)
            - id: branch-service
              uri: lb://branch-service
              predicates:
                - Path=/api/v1/branches/**
              filters:
                - StripPrefix=2
            # Catalog (UC04, UC10)
            - id: catalog-service
              uri: lb://catalog-service
              predicates:
                - Path=/api/v1/medicines/**,/api/v1/search/**
              filters:
                - StripPrefix=2
            # Category
            - id: category-service
              uri: lb://category-service
              predicates:
                - Path=/api/v1/categories/**
              filters:
                - StripPrefix=2
            # Supplier (UC11)
            - id: supplier-service
              uri: lb://supplier-service
              predicates:
                - Path=/api/v1/suppliers/**
              filters:
                - StripPrefix=2
            # Inventory (UC05)
            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/v1/inventory/**
              filters:
                - StripPrefix=2
            # Customer (UC08)
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/v1/customers/**
              filters:
                - StripPrefix=2
            # B2C Order endpoints (UC14) - must precede order-service catch-all
            - id: customer-portal-orders
              uri: lb://customer-portal-service
              predicates:
                - Path=/api/v1/orders/history,/api/v1/orders/*/track,/api/v1/orders/*/detail
              filters:
                - StripPrefix=2
            # Order (UC06) + Coupons
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**,/api/v1/coupons/**
              filters:
                - StripPrefix=2
            # Payment (UC07) + Webhooks
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**,/api/v1/webhooks/**
              filters:
                - StripPrefix=2
            # Prescription (UC12)
            - id: prescription-service
              uri: lb://prescription-service
              predicates:
                - Path=/api/v1/prescriptions/**
              filters:
                - StripPrefix=2
            # Notification (UC13)
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**
              filters:
                - StripPrefix=2
            # Report (UC09)
            - id: report-service
              uri: lb://report-service
              predicates:
                - Path=/api/v1/reports/**
              filters:
                - StripPrefix=2
            # Customer Portal B2C (UC14, UC18, UC19) - Sprint 4
            - id: customer-portal-service
              uri: lb://customer-portal-service
              predicates:
                - Path=/api/v1/shop/**,/api/v1/store/**,/api/v1/vaccines/**,/api/v1/vaccine-bookings/**,/api/v1/vaccination-ledger/**,/api/v1/health-articles/**,/api/v1/diseases/**,/api/v1/videos/**,/api/v1/lookup/**,/api/v1/verify-origin/**,/api/v1/addresses/**,/api/v1/favorites/**,/api/v1/family/**,/api/v1/cart/**,/api/v1/notif-settings/**,/api/v1/installment/**,/api/v1/wallet/**,/api/v1/vouchers/**,/api/v1/admin/videos/**
              filters:
                - StripPrefix=2
            # Pharmacist Workbench (UC16) - Sprint 9
            - id: pharmacist-workbench-service
              uri: lb://pharmacist-workbench-service
              predicates:
                - Path=/api/v1/rx/**,/api/v1/consultations/**,/api/v1/follow-ups/**,/api/v1/vip-marks/**
              filters:
                - StripPrefix=2
            # Health Tools (UC18) - Sprint 10
            - id: health-tools-service
              uri: lb://health-tools-service
              predicates:
                - Path=/api/v1/health/**
              filters:
                - StripPrefix=2
            # E-commerce Ops (UC19) - Sprint 10
            - id: ecom-ops-service
              uri: lb://ecom-ops-service
              predicates:
                - Path=/api/v1/ecom-ops/**,/api/v1/admin/vouchers/**,/api/v1/admin/flash-sales/**,/api/v1/admin/reviews/**
              filters:
                - StripPrefix=2
            # Admin Video routes - explicit paths for /admin/videos/**
            - id: customer-portal-admin-videos
              uri: lb://customer-portal-service
              predicates:
                - Path=/api/v1/admin/videos/**
              filters:
                - StripPrefix=2
            # Flash sales under ecom-ops (admin)
            - id: ecom-ops-flash-sales
              uri: lb://ecom-ops-service
              predicates:
                - Path=/api/v1/admin/videos/flash-sales/**
              filters:
                - StripPrefix=2

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5

management:
  endpoints:
    web:
      exposure:
        include: "*"
