spring:
  application:
    name: order-service
  config:
    import: "optional:configserver:http://localhost:8888"
  profiles:
    active: default
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  main:
    allow-bean-definition-overriding: true


server:
  port: 8088

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

order:
  bulk-discount-threshold: 10      # BR04: qty >= 10
  bulk-discount-rate: 0.05         # BR04: 5% discount
  pending-payment-timeout-hours: 24  # BR01: auto-cancel after 24h

resilience4j:
  circuitbreaker:
    instances:
      inventoryService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      catalogService:
        sliding-window-size: 10
        failure-rate-threshold: 50
      customerService:
        sliding-window-size: 10
        failure-rate-threshold: 50

management:
  endpoints:
    web:
      exposure:
        include: "*"
