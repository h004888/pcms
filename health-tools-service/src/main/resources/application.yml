server:
  port: 8097
spring:
  application:
    name: health-tools-service
  datasource:
    url: jdbc:mysql://localhost:3306/pcms_health_tools
    username: pcms_user
    password: pcms_pass
  jpa:
    hibernate:
      ddl-auto: update
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: "*"
