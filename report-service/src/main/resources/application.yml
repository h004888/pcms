spring:
  application:
    name: report-service
  config:
    import: "optional:configserver:http://localhost:8888"
  profiles:
    active: default
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect


server:
  port: 8092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

report:
  export:
    excel:
      enabled: true
    pdf:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
