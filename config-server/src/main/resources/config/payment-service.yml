# Payment Service (UC07)
server:
  port: 8089
spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/pcms_payment?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${MYSQL_USER:pcms_user}
    password: ${MYSQL_PASSWORD:pcms_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# Loyalty points (BR07)
payment:
  loyalty-points-per-1000-vnd: 1
  invoice-prefix: "INV"
  # B-09: HMAC secret for payment gateway webhook
  webhook-secret: "pcms-payment-gateway-webhook-secret-2026-do-not-share"

# JWT settings (shared)
app:
  jwt:
    secret: "pcms-jwt-secret-key-must-be-at-least-32-bytes-long-for-hs256-signing-2026"
