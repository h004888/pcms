spring:
  application:
    name: default-service
  profiles:
    active: default
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/pcms?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: pcms_user
    password: pcms_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

# NOTE: server.port is intentionally NOT set here.
# Each service defines its own port in its {service-name}.yml file.
# If we set it here, the config-server itself would also pick up this value
# when active profile is "native" (because search-locations is classpath:/config).

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlation_id:-}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.pcms: DEBUG
