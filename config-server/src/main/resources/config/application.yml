spring:
  application:
    name: default-service
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/pcms?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  # ============================================================
  # Eureka shutdown resilience (Defense-in-Depth)
  # ============================================================
  # Bật override bean để EurekaResilientShutdownAutoConfiguration
  # (trong pcms-common) thay thế bean EurekaAutoServiceRegistration
  # gốc của Spring Cloud Netflix.
  main:
    allow-bean-definition-overriding: true
  # Bound tổng thời gian shutdown để service không treo vô tận
  # nếu Eureka unregister bị hang (HTTP call không có timeout).
  lifecycle:
    timeout-per-shutdown-phase: 15s

# NOTE: server.port is intentionally NOT set here.
# Each service defines its own port in its {service-name}.yml file.
# If we set it here, the config-server itself would also pick up this value
# when active profile is "native" (because search-locations is classpath:/config).

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    # Lease renewal mỗi 10s (mặc định 30s) - phát hiện instance chết nhanh hơn
    lease-renewal-interval-in-seconds: 10
    # Sau 30s không thấy heartbeat thì Eureka tự xóa entry (mặc định 90s)
    # Đây là cơ chế cleanup chính khi service không thể unregister sạch
    # (Eureka down, network partition, SIGKILL trong Kubernetes, ...).
    lease-expiration-duration-in-seconds: 30

# Bật/tắt fix Eureka shutdown (mặc định true). Tắt nếu service không
# dùng Eureka hoặc muốn giữ behavior gốc.
pcms:
  eureka:
    resilient-shutdown: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlation_id:-}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.pcms: DEBUG