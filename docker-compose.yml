version: "3.8"

# =====================================================
# PCMS - Pharmacy Chain Management System
# 18 microservices + MySQL 8.0 + PostgreSQL + Redis
# Run order: mysql,config-server,discovery-server -> api-gateway -> others -> frontend
# Build context = project root (pcms/), Dockerfile = each service's subpath
# =====================================================

networks:
  pcms-net:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  config-git:
    driver: local

services:
  # ============== Infrastructure ==============
  mysql:
    image: mysql:8.0
    container_name: pcms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: pcms
      MYSQL_USER: pcms_user
      MYSQL_PASSWORD: pcms_pass
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - pcms-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppcms_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: pcms-postgres
    environment:
      POSTGRES_USER: pcms_user
      POSTGRES_PASSWORD: pcms_pass
      POSTGRES_DB: pcms_ai_engine
    ports:
      - "5432:5432"
    networks:
      - pcms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcms_user -d pcms_ai_engine"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pcms-redis
    ports:
      - "6379:6379"
    networks:
      - pcms-net

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: pcms-config-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    volumes:
      - ./config-server/src/main/resources/config:/app/config:ro
      - config-git:/app/git-repo
    networks:
      - pcms-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: pcms-discovery-server
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - pcms-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 60s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: pcms-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - pcms-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 90s

  # ============== Business Services ==============
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: pcms-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - pcms-net
    restart: unless-stopped

  branch-service:
    build:
      context: .
      dockerfile: branch-service/Dockerfile
    container_name: pcms-branch-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - pcms-net
    restart: unless-stopped

  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    container_name: pcms-catalog-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
