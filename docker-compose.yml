  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: pcms-notification-service
    ports:
      - "8091:8091"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SMTP_USERNAME: ${SMTP_USERNAME:-notification@pcms.vn}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-changeme}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
