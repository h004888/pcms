      discovery-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - pcms-net
    restart: unless-stopped

  prescription-service:
    build:
      context: .
      dockerfile: prescription-service/Dockerfile
    container_name: pcms-prescription-service
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
