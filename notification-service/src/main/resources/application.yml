# Notification Service (UC13)
server:
  port: 8091
spring:
  application:
    name: notification-service
  config:
    import: "optional:configserver:http://localhost:8888"
  profiles:
    active: default
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/pcms_notification?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  # B-11: SMTP config for email notifications — OPT-IN via env vars.
  # Triệt để: nếu MAIL_HOST không được set, host="" rỗng → Spring Boot
  # không khởi tạo MailSender bean → MailHealthIndicator không được register
  # → /actuator/health không có component "mail" → không còn MailConnectException.
  # Khi cần gửi email thật, set MAIL_HOST (vd: smtp.gmail.com) + MAIL_PORT + creds.
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
  # Tắt MailHealthIndicator được khai báo ở top-level management phía dưới file.

# Notification retry policy (NSF-09)
notification:
  retry:
    max-attempts: 3
    backoff-ms: 1000
  channels:
    in-app: true
    email: ${NOTIFICATION_EMAIL_ENABLED:true}
    sms: ${NOTIFICATION_SMS_ENABLED:false}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  # Tắt MailHealthIndicator: chỉ chạy khi mail host thật; tránh log noise khi dev.
  # Khi bật mail thật, comment dòng dưới và set MAIL_HOST env var.
  health:
    mail:
      enabled: false
