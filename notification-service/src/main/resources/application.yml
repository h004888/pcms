spring:
  application:
    name: notification-service
  config:
    import: "optional:configserver:http://localhost:8888"
  profiles:
    active: default
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  # NOTE: spring.mail.* intentionally NOT set
  # When SMTP is not configured, JavaMailSender bean is null,
  # and NotificationSenderService.sendEmail() will skip with a warning.
  # To enable real email, set:
  #   SPRING_MAIL_HOST, SPRING_MAIL_PORT, SPRING_MAIL_USERNAME, SPRING_MAIL_PASSWORD
  #   as environment variables or in config-server/notification-service.yml

server:
  port: 8091

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

notification:
  retry:
    max-attempts: 3     # NSF-09
    backoff-ms: 1000
  channels:
    in-app: true
    email: false
    sms: false

# Email retry is disabled by default (no SMTP configured).
# To enable, add spring.mail.* config and uncomment below.
# resilience4j:
#   retry:
#     instances:
#       emailService:
#         max-attempts: 3
#         wait-duration: 1s

management:
  endpoints:
    web:
      exposure:
        include: "*"
