# Notification Service (UC13)
server:
  port: 8091
spring:
  application:
    name: notification-service
  config:
    import: "optional:configserver:http://localhost:8888"
  profiles:
    active: default
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/pcms_notification?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${MYSQL_USER:pcms_user}
    password: ${MYSQL_PASSWORD:pcms_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  # B-11: SMTP config for email notifications (MailHog in dev)
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Notification retry policy (NSF-09)
notification:
  retry:
    max-attempts: 3
    backoff-ms: 1000
  channels:
    in-app: true
    email: ${NOTIFICATION_EMAIL_ENABLED:true}
    sms: ${NOTIFICATION_SMS_ENABLED:false}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
